{% macro icon(name, classes='icon') -%}
<svg class="{{ classes }}" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">

    <path d="M15.75 6.75A3.75 3.75 0 1 1 8.25 6.75A3.75 3.75 0 0 1 15.75 6.75Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M13.125 5.625L10.875 18.375" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>

    {% elif name == "identification" %}
    <path d="M3.75 6.75A2.25 2.25 0 0 1 6 4.5H18A2.25 2.25 0 0 1 20.25 6.75V17.25A2.25 2.25 0 0 1 18 19.5H6A2.25 2.25 0 0 1 3.75 17.25V6.75Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M7.5 9.75H12M7.5 13.5H15.75M15.75 9.75H16.5" stroke="currentColor" stroke-linecap="round"/>
    {% elif name == "building-office" %}
    <path d="M3.75 20.25H20.25M5.25 20.25V6.75A2.25 2.25 0 0 1 7.5 4.5H16.5A2.25 2.25 0 0 1 18.75 6.75V20.25M9 8.25H10.5M13.5 8.25H15M9 12H10.5M13.5 12H15M9 15.75H10.5M13.5 15.75H15" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M3 6.75A2.25 2.25 0 0 1 5.25 4.5H18.75A2.25 2.25 0 0 1 21 6.75V17.25A2.25 2.25 0 0 1 18.75 19.5H5.25A2.25 2.25 0 0 1 3 17.25V6.75Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3.75 7.5L12 13.5L20.25 7.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
    {% elif name == "check-circle" %}
    <path d="M9 12L11.25 14.25L15 10.5M21 12A9 9 0 1 1 3 12A9 9 0 0 1 21 12Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
    {% elif name == "exclamation-triangle" %}
    <path d="M12 9V12.75M12 16.5H12.008M10.29 3.86L1.82 18A1.8 1.8 0 0 0 3.36 20.7H20.64A1.8 1.8 0 0 0 22.18 18L13.71 3.86A1.8 1.8 0 0 0 10.29 3.86Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
    {% elif name == "information-circle" %}
    <path d="M12 16.5V12M12 7.5H12.008M21 12A9 9 0 1 1 3 12A9 9 0 0 1 21 12Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
    {% elif name == "arrow-right" %}
    <path d="M4.5 12H19.5M19.5 12L13.5 6M19.5 12L13.5 18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
    {% elif name == "home" %}
    <path d="M3 10.5L12 3L21 10.5V19.5A1.5 1.5 0 0 1 19.5 21H4.5A1.5 1.5 0 0 1 3 19.5V10.5Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M9 21V12.75H15V21" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
    {% elif name == "clock" %}
    <path d="M12 6.75V12L15.75 14.25M21 12A9 9 0 1 1 3 12A9 9 0 0 1 21 12Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
    {% else %}
    <circle cx="12" cy="12" r="9" stroke="currentColor"/>
    {% endif %}
</svg>
{%- endmacro %}
